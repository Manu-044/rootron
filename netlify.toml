# Netlify configuration for Next.js
[build]
  command = "npm run build"
  publish = ".next"

# Use the Next.js runtime for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# This is important for Next.js on Netlify
[functions]
  node_bundler = "esbuild"

